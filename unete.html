<div class="join-form-wrap">
  <form class="glass-form" id="miFormulario">
    <div class="form-title">Solicitud de Ingreso</div>

    <input type="hidden" name="access_key" value="cf58328d-aeb8-44be-8c0b-db570b20afac">

    <div class="form-group">
      <label>Nombre / Gamertag</label>
      <input type="text" name="gamertag" placeholder="Tu nombre de jugador" required>
    </div>

    <div class="form-group">
      <label>Plataforma</label>
      <select name="plataforma" required>
        <option value="" disabled selected>Selecciona tu plataforma</option>
        <option>PlayStation 5</option>
        <option>Xbox Series X</option>
        <option>PC (Steam / EA App)</option>
      </select>
    </div>

    <div class="form-group">
      <label>ID Online (PSN / Xbox / EA)</label>
      <input type="text" name="id_online" placeholder="Tu ID online" required>
    </div>

    <div class="form-group">
      <label>División actual</label>
      <select name="division" required>
        <option value="" disabled selected>Tu división en FUT Champions</option>
        <option>Elite</option>
        <option>División 1</option>
        <option>División 2</option>
        <option>División 3</option>
        <option>División 4+</option>
      </select>
    </div>

    <div class="form-group">
      <label>¿Por qué quieres unirte?</label>
      <input type="text" name="mensaje" placeholder="Cuéntanos brevemente..." required>
    </div>

    <button type="submit" class="btn-submit" id="btnEnviar">🔥 Enviar Solicitud</button>
    <div id="resultado" style="margin-top: 15px; font-family: 'Barlow Condensed'; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem;"></div>
  </form>
</div>

<script>
  // Control del Menú Hamburguesa
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('open');
  }

  // Lógica de Envío del Formulario (Web3Forms)
  const form = document.getElementById('miFormulario');
  const result = document.getElementById('resultado');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(form);
    const object = Object.fromEntries(formData);
    const json = JSON.stringify(object);

    result.innerHTML = "PROCESANDO ACCESO...";
    result.style.color = "var(--neon-purple)";

    fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: json
        })
        .then(async (response) => {
            let json = await response.json();
            if (response.status == 200) {
                result.innerHTML = "SOLICITUD ENVIADA CON ÉXITO";
                result.style.color = "#00ff88"; // Verde neón para éxito
                form.reset();
            } else {
                console.log(response);
                result.innerHTML = json.message;
                result.style.color = "var(--neon-blue)";
            }
        })
        .catch(error => {
            console.log(error);
            result.innerHTML = "ERROR DE CONEXIÓN";
        })
        .then(function() {
            setTimeout(() => {
                result.innerHTML = "";
            }, 5000);
        });
  });

  // Estética del Header al hacer Scroll
  window.addEventListener('scroll', () => {
    document.getElementById('main-nav').style.background =
      window.scrollY > 50 ? 'rgba(15,5,0,0.97)' : 'rgba(15,5,0,0.85)';
  });

  // Efecto del Trail (Puntero Neón)
  if (window.innerWidth > 768) {
    const trail = document.createElement('div');
    trail.style.cssText = `position:fixed;pointer-events:none;z-index:9999;width:6px;height:6px;border-radius:50%;background:var(--neon-blue);box-shadow:0 0 12px var(--neon-blue),0 0 24px rgba(255,42,42,0.4);mix-blend-mode:screen;`;
    document.body.appendChild(trail);
    document.addEventListener('mousemove', e => {
      trail.style.left = (e.clientX - 3) + 'px';
      trail.style.top = (e.clientY - 3) + 'px';
    });
  }
</script>
