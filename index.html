<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RED DRAGON — Domina el Campo</title>

<style>

/* ─── RESET ─── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ─── VARIABLES ─── */
:root {
  --neon-blue: #ff2a2a;
  --neon-purple: #ff7a00;
  --neon-glow-blue: #ff2a2a88;
  --neon-glow-purple: #ff7a0066;
  --bg-dark: #0f0500;
  --bg-mid: #1a0800;
  --bg-card: rgba(255,60,0,0.03);
  --border-glass: rgba(255,80,0,0.10);
  --text-primary: #fff0e8;
  --text-muted: #8a6a5a;
  --grid-color: rgba(255,42,42,0.07);
}

/* ─── BASE ─── */
html { scroll-behavior: smooth; }

body {
  background-color: var(--bg-dark);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ─── GRID ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ─── HERO ─── */
#inicio {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-title {
  font-size: 5rem;
  letter-spacing: 5px;
}

.hero-sub {
  color: var(--text-muted);
  margin: 1rem 0;
}

/* ─── BOTÓN ─── */
.btn-cta {
  display: inline-block;
  padding: 12px 30px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  color: #000;
  text-decoration: none;
}

/* ─── FIELD ─── */
.field {
  width: 300px;
  height: 450px;
  margin: 2rem auto;
  position: relative;
  border: 2px solid rgba(255,255,255,0.2);
}

/* POSICIONES */
.fp {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
}

.fp-dot {
  background: var(--neon-blue);
  padding: 6px;
  border-radius: 50%;
  font-size: 10px;
}

.fp-label {
  font-size: 10px;
}

/* POSICIONES ESPECÍFICAS */
.pos-gk { left: 50%; top: 90%; }
.pos-ed { left: 20%; top: 20%; }
.pos-st { left: 50%; top: 15%; }
.pos-ei { left: 80%; top: 20%; }

</style>
</head>

<body>

<section id="inicio">
  <div>
    <h1 class="hero-title">RED DRAGON</h1>
    <p class="hero-sub">Domina el Campo</p>
    <a href="#" class="btn-cta">Únete al Club</a>
  </div>
</section>

<section>
  <h2>Formación 4-2-1-3</h2>

  <div class="field">

    <!-- PORTERO -->
    <div class="fp pos-gk">
      <div class="fp-dot">POR</div>
      <div class="fp-label">Portero</div>
    </div>

    <!-- DEFENSAS -->
    <div class="fp" style="left:15%; top:75%;">
      <div class="fp-dot">RB</div>
      <div class="fp-label">Lateral</div>
    </div>

    <div class="fp" style="left:40%; top:75%;">
      <div class="fp-dot">CB</div>
      <div class="fp-label">Central</div>
    </div>

    <div class="fp" style="left:60%; top:75%;">
      <div class="fp-dot">CB</div>
      <div class="fp-label">Central</div>
    </div>

    <div class="fp" style="left:85%; top:75%;">
      <div class="fp-dot">LB</div>
      <div class="fp-label">Lateral</div>
    </div>

    <!-- MEDIOS -->
    <div class="fp" style="left:35%; top:55%;">
      <div class="fp-dot">MCD</div>
      <div class="fp-label">Contención</div>
    </div>

    <div class="fp" style="left:65%; top:55%;">
      <div class="fp-dot">MCD</div>
      <div class="fp-label">Contención</div>
    </div>

    <!-- MCO -->
    <div class="fp" style="left:50%; top:40%;">
      <div class="fp-dot">MCO</div>
      <div class="fp-label">Creativo</div>
    </div>

    <!-- ATAQUE -->
    <div class="fp pos-ed">
      <div class="fp-dot">ED</div>
      <div class="fp-label">Extremo</div>
    </div>

    <div class="fp pos-st">
      <div class="fp-dot">ST</div>
      <div class="fp-label">Delantero</div>
    </div>

    <div class="fp pos-ei">
      <div class="fp-dot">EI</div>
      <div class="fp-label">Extremo</div>
    </div>

  </div>
</section>

<script>

// MENU (si lo usas después)
function toggleMenu() {
  document.getElementById('navLinks')?.classList.toggle('open');
}

</script>

</body>
</html>
