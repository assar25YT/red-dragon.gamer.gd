<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED DRAGON — Domina el Campo</title>
    <style>
        :root {
            --neon-blue: #ff2a2a;
            --neon-purple: #ff7a00;
            --neon-glow-blue: #ff2a2a88;
            --neon-glow-purple: #ff7a0066;
            --bg-dark: #0f0500;
            --bg-mid: #1a0800;
            --bg-card: rgba(255, 60, 0, 0.03);
            --border-glass: rgba(255, 80, 0, 0.10);
            --text-primary: #fff0e8;
            --text-muted: #8a6a5a;
            --grid-color: rgba(255, 42, 42, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* ─── GRID BACKGROUND ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── STICKY NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            height: 82px;
            background: rgba(5, 5, 15, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-actions { display: flex; gap: 1rem; align-items: center; }

        .btn-nav {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-register {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
        }

        .btn-register:hover {
            background: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px var(--neon-glow-blue);
        }

        .btn-join {
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 16px var(--neon-glow-blue);
        }

        /* ─── MODAL REGISTRO ─── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--bg-mid);
            border: 1px solid var(--neon-blue);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 0 30px var(--neon-glow-blue);
        }

        .modal-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--neon-blue);
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: white;
            outline: none;
        }
        .form-group input:focus { border-color: var(--neon-blue); }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: var(--neon-blue);
            color: black;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ─── HERO & OTHERS (Simplificado para el ejemplo) ─── */
        #inicio { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 8vw; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <a href="#" class="nav-logo">RED DRAGON<span>FIFA 25 CLUB</span></a>
        <div class="nav-actions">
            <button class="btn-nav btn-register" onclick="openModal()">Registrarse</button>
            <a href="#contacto" class="btn-nav btn-join">Únete</a>
        </div>
    </nav>

    <div id="modalRegistro" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>CREAR CUENTA</h2>
            <div class="form-group">
                <label>Usuario (PSN/EA ID)</label>
                <input type="text" id="reg_usuario" placeholder="Ej: Dragon_Gamer">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="reg_email" placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="reg_password" placeholder="********">
            </div>
            <button class="btn-send" onclick="enviarRegistro()">Finalizar Registro</button>
            <p id="mensaje" style="margin-top:10px; font-size:0.8rem; text-align:center;"></p>
        </div>
    </div>

    <section id="inicio">
        <div class="hero-content">
            <h1 class="hero-title">DOMINA EL <span style="color:var(--neon-blue)">CAMPO</span></h1>
            <p>FIFA 25 COMPETITIVE CLUB</p>
        </div>
    </section>

    <script>
        // MODAL CONTROL
        function openModal() { document.getElementById('modalRegistro').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalRegistro').style.display = 'none'; }

        // ENVIAR DATOS A INFINITYFREE
        function enviarRegistro() {
            const user = document.getElementById('reg_usuario').value;
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_password').value;
            const msj = document.getElementById('mensaje');

            if(!user || !email || !pass) {
                msj.style.color = "yellow";
                msj.innerText = "Por favor, completa todos los campos.";
                return;
            }

            msj.style.color = "white";
            msj.innerText = "Procesando...";

            const datos = {
                usuario: user,
                email: email,
                password: pass
            };

            // URL DE TU ARCHIVO PHP EN INFINITYFREE
            fetch('https://red-dragon.gamer.gd/registro.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    msj.style.color = "#00ff00";
                    msj.innerText = "¡Usuario registrado correctamente!";
                    setTimeout(closeModal, 2000);
                } else {
                    msj.style.color = "#ff0000";
                    msj.innerText = "Error: " + data.error;
                }
            })
            .catch(err => {
                msj.style.color = "#ff0000";
                msj.innerText = "Error de conexión con el servidor.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
