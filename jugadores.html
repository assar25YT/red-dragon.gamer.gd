<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagenes/MANDO.png">
    <title>RED DRAGON — Jugadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #ff2a2a;
            --neon-purple: #ff7a00;
            --neon-glow-blue: #ff2a2a88;
            --neon-glow-purple: #ff7a0066;
            --bg-dark: #0f0500;
            --bg-mid: #1a0800;
            --bg-card: rgba(255,60,0,0.03);
            --border-glass: rgba(255,80,0,0.15);
            --text-primary: #fff0e8;
            --text-muted: #8a6a5a;
            --grid-color: rgba(255,42,42,0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }

        /* --- NAV (ESTILO INDEX) --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6%; height: 82px;
            background: rgba(15,5,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            transition: 0.4s;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem; letter-spacing: 5px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-logo span {
            -webkit-text-fill-color: var(--neon-blue);
            font-size: 0.68rem; letter-spacing: 9px;
            display: block; margin-top: -7px;
        }

        .nav-links { display: flex; gap: 3rem; list-style: none; align-items: center; }
        .nav-links a {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 600; letter-spacing: 3px;
            text-transform: uppercase; color: var(--text-muted); text-decoration: none;
            transition: 0.3s; position: relative;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--neon-blue); }

        .nav-cta {
            background: var(--neon-blue); color: var(--bg-dark) !important;
            padding: 10px 28px; border-radius: 2px; font-weight: 700;
            box-shadow: 0 0 16px var(--neon-glow-blue);
        }

        /* --- CONTENIDO JUGADORES --- */
        .page-header {
            padding: 10rem 6% 2rem;
            text-align: center;
            position: relative; z-index: 1;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 7vw, 5rem); letter-spacing: 5px;
        }

        .accent {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .roster-container {
            display: flex;
            max-width: 1200px;
            margin: 2rem auto 8rem;
            height: 700px;
            background: rgba(20,10,5,0.6);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(15px);
            position: relative; z-index: 1;
        }

        .player-list {
            width: 350px;
            border-right: 1px solid var(--border-glass);
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
        }

        .list-header {
            padding: 20px; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem; color: var(--neon-blue);
            border-bottom: 1px solid var(--border-glass);
            display: flex; justify-content: space-between;
        }

        .player-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 20px; cursor: pointer;
            transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .player-item:hover { background: rgba(255,42,42,0.1); }
        .player-item.active {
            background: linear-gradient(90deg, rgba(255,42,42,0.2), transparent);
            border-left: 4px solid var(--neon-blue);
        }

        .list-pos {
            background: var(--neon-blue); color: #000;
            font-weight: 800; font-size: 0.7rem;
            padding: 2px 8px; border-radius: 2px; min-width: 40px; text-align: center;
        }

        .list-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; }

        .player-detail {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px; background: radial-gradient(circle, rgba(255,42,42,0.05) 0%, transparent 70%);
        }

        .card-visual {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glass);
            width: 100%; max-width: 400px;
            padding: 40px; text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .big-avatar { font-size: 5.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--neon-blue)); }
        .big-name { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; margin-bottom: 5px; }
        .big-psn { color: var(--neon-purple); font-weight: 600; font-size: 0.9rem; margin-bottom: 25px; }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            border-top: 1px solid var(--border-glass); padding-top: 25px;
        }

        .stat-box { text-align: left; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--neon-blue); }

        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.05); margin-top: 5px; }
        .bar-fill { height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 1s; }

        /* --- FOOTER (TU CODIGO) --- */
        footer {
            padding: 4rem 6%; 
            border-top: 1px solid var(--border-glass);
            text-align: center; 
            position: relative; 
            z-index: 1;
            background: rgba(10, 5, 0, 0.8);
        }

        .footer-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .social-link {
            color: var(--text-muted);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            text-decoration: none;
        }

        .social-link:hover {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-glow-blue);
            transform: translateY(-3px);
        }

        .footer-copy {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 850px) {
            .roster-container { flex-direction: column; height: auto; }
            .player-list { width: 100%; height: 250px; }
        }
    </style>
</head>
<body>

<nav id="main-nav">
    <a href="index.html" class="nav-logo">
        RED DRAGON
        <span>FIFA 25 CLUB</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="jugadores.html">Jugadores</a></li>
      <li><a href="#formacion">Formación</a></li>
      <li><a href="galeria.html">Galeria</a></li>
      <li><a href="unete.html" class="nav-cta">Únete</a></li>
  </ul>
    </ul>
</nav>

<div class="page-header">
    <h1 class="page-title"><span class="accent">Nuestra</span> Plantilla</h1>
    <p style="color: var(--text-muted); letter-spacing: 2px;">ESTADÍSTICAS OFICIALES TEMPORADA 2026</p>
</div>

<div class="roster-container">
    <div class="player-list" id="playerList">
        <div class="list-header">TITULARES <span>4-3-3</span></div>
    </div>
    <div class="player-detail" id="playerDetail"></div>
</div>

<!-- FOOTER REDES -->
<footer>
  <div class="footer-logo">RED DRAGON</div>
  <div class="footer-socials">
    <!-- TIKTOK -->
    <a href="https://www.tiktok.com/@yisusoc" class="social-link" title="TikTok">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.31-.75.42-1.24 1.25-1.33 2.1-.1.7.1 1.41.53 1.98.5.73 1.36 1.13 2.24 1.1 1.49-.06 2.71-1.14 2.84-2.62.03-5.52.03-11.04.03-16.56z"/>
      </svg>
    </a>
  </div>
  <div class="footer-copy">© 2025 NEXUS FC · Todos los derechos reservados · FIFA 25 eSports Club</div>
</footer>
<script>
    const players = [
        { name: "ShadowK", pos: "POR", emoji: "🧤", psn: "PSN: ShadowK_99", g: 0, a: 1 },
        { name: "Alex-T", pos: "LI", emoji: "🏃", psn: "PSN: AlexT_Lateral", g: 2, a: 15 },
        { name: "IronWall", pos: "DFC", emoji: "🛡️", psn: "XBX: IronWall_Pro", g: 5, a: 2 },
        { name: "TheRock", pos: "DFC", emoji: "🧱", psn: "PSN: Rock_Def", g: 4, a: 1 },
        { name: "Turbo-V", pos: "LD", emoji: "🏎️", psn: "PSN: TurboV_01", g: 1, a: 12 },
        { name: "VoltMid", pos: "MC", emoji: "⚡", psn: "PSN: Volt_88", g: 12, a: 25 },
        { name: "Maestro", pos: "MCD", emoji: "🧠", psn: "PSN: MaestroFUT", g: 3, a: 18 },
        { name: "Creative", pos: "MC", emoji: "🎨", psn: "PSN: Creative_Art", g: 8, a: 30 },
        { name: "DragonB", pos: "EI", emoji: "🔥", psn: "PSN: DragonB_25", g: 45, a: 20 },
        { name: "Titan", pos: "DC", emoji: "🎯", psn: "XBX: Titan_Striker", g: 62, a: 10 },
        { name: "Flash", pos: "ED", emoji: "⚡", psn: "PSN: Flash_ED", g: 38, a: 22 }
    ];

    const listContainer = document.getElementById('playerList');

    function renderDetail(index) {
        const p = players[index];
        const detail = document.getElementById('playerDetail');
        const gBar = Math.min((p.g / 70) * 100, 100);
        const aBar = Math.min((p.a / 40) * 100, 100);

        detail.innerHTML = `
            <div class="card-visual">
                <div class="big-avatar">${p.emoji}</div>
                <h2 class="big-name">${p.name}</h2>
                <div class="big-psn">${p.psn}</div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">⚽ GOLES</div>
                        <div class="stat-val">${p.g}</div>
                        <div class="bar-bg"><div class="bar-fill" style="width: ${gBar}%"></div></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">👟 ASISTENCIAS</div>
                        <div class="stat-val">${p.a}</div>
                        <div class="bar-bg"><div class="bar-fill" style="width: ${aBar}%"></div></div>
                    </div>
                </div>
            </div>`;
    }

    players.forEach((p, index) => {
        const item = document.createElement('div');
        item.className = `player-item ${index === 0 ? 'active' : ''}`;
        item.innerHTML = `<span class="list-pos">${p.pos}</span><span class="list-name">${p.name}</span>`;
        item.onclick = () => {
            document.querySelectorAll('.player-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            renderDetail(index);
        };
        listContainer.appendChild(item);
    });

    renderDetail(0);
</script>

</body>
</html>
